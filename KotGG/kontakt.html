    <section class="content-section">
        <h1 style="text-align: center;">Napisz do nas!</h1>
        <p style="text-align: center;">Masz pytanie? Chcesz wysłać zdjęcie swojego kota? Użyj formularza poniżej.</p>
        
        <form action="https://formspree.io/f/xdapypqg" method="POST" class="contact-form">
            <input type="text" name="name" placeholder="Twoje imię" required>
            <input type="email" name="email" placeholder="Twój adres E-mail" required>
            <textarea name="message" rows="6" placeholder="Twoja miau-wiadomość..." required></textarea>
            <button type="submit" class="btn">Wyślij wiadomość</button>
        </form>
    </section>
